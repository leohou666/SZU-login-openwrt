name: Go CI/CD

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '>=1.20'
      - name: Check out code
        uses: actions/checkout@v4
      - name: Go mod tidy (verify clean)
        run: |
          go mod tidy
          git diff --exit-code || (echo 'go.mod / go.sum 不干净，请本地运行 go mod tidy 并提交' && exit 1)
      - name: Run tests
        run: |
          go test -v ./...
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: darwin
            goarch: arm64 # macOS arm64 构建需要 macOS runner
    steps:
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '>=1.20'
      - name: Check out code
        uses: actions/checkout@v4
      - name: Go mod tidy (verify clean)
        run: |
          go mod tidy
          git diff --exit-code || (echo 'go.mod / go.sum 不干净，请本地运行 go mod tidy 并提交' && exit 1)
      - name: Build binary
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o szu-login-${{ matrix.goos }}-${{ matrix.goarch }}.exe cmd/srun-login.go
          else
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o szu-login-${{ matrix.goos }}-${{ matrix.goarch }} cmd/srun-login.go
          fi
  build-openwrt:
    name: Build OpenWrt
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            suffix: x86_64
          - goarch: arm64
            suffix: aarch64
          - goarch: mipsle
            gomips: softfloat
            suffix: mipsle
    steps:
      - uses: actions/setup-go@v4
        with:
          go-version: '>=1.20'
      - uses: actions/checkout@v4
      - name: Build static binary for OpenWrt
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} GOMIPS=${{ matrix.gomips }} \
            go build -o szu-login-openwrt-${{ matrix.suffix }} cmd/srun-login.go
      - uses: actions/upload-artifact@v4
        with:
          name: szu-login-openwrt-${{ matrix.suffix }}
          path: szu-login-openwrt-${{ matrix.suffix }}
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: szu-login-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}
          path: szu-login-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}
  build-macos-arm64:
    name: Build macOS arm64
    needs: test
    runs-on: macos-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '>=1.20'
      - name: Check out code
        uses: actions/checkout@v4
      - name: Go mod tidy (verify clean)
        run: |
          go mod tidy
          git diff --exit-code || (echo 'go.mod / go.sum 不干净，请本地运行 go mod tidy 并提交' && exit 1)
      - name: Build binary
        run: |
          GOOS=darwin GOARCH=arm64 go build -o szu-login-darwin-arm64 cmd/srun-login.go
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: szu-login-darwin-arm64
          path: szu-login-darwin-arm64
  package:
    name: Create Release Package
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          
      - name: Create Release ZIP
        run: |
          cd release-artifacts
          zip -r ../szu-login-all-platforms.zip ./*
          
      - name: Upload Release Package
        uses: actions/upload-artifact@v4
        with:
          name: szu-login-all-platforms
          path: szu-login-all-platforms.zip
